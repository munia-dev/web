<!doctype html><html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Monitor de batería</title><link rel="icon" type="image/x-icon" href="favicon.ico"><style> :root { --bg1: #0f172a; --bg2: #111827; --panel: rgba(255,255,255,0.08); --panel-border: rgba(255,255,255,0.14); --text: #e5e7eb; --muted: #9ca3af; --accent: #60a5fa; --accent-2: #34d399; --danger: #f59e0b; --shadow: 0 20px 50px rgba(0,0,0,0.35); } * { box-sizing: border-box; } body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, Arial, sans-serif; color: var(--text); background: radial-gradient(circle at top left, rgba(96,165,250,0.15), transparent 35%), radial-gradient(circle at top right, rgba(52,211,153,0.10), transparent 30%), linear-gradient(135deg, var(--bg1), var(--bg2)); } .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 56px; } .hero { background: var(--panel); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); border-radius: 24px; padding: 28px; box-shadow: var(--shadow); margin-bottom: 22px; } h1 { margin: 0 0 8px; font-size: 32px; line-height: 1.1; font-weight: 800; letter-spacing: -0.02em; } .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 24px; } .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; } .stat { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; } .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; } .stat-value { font-size: 20px; font-weight: 700; } .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px; } button { border: 0; border-radius: 14px; padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.15s ease, opacity 0.15s ease; } button:hover { transform: translateY(-1px); } .primary { background: linear-gradient(135deg, var(--accent), #3b82f6); color: white; } .secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.1); } .panel { background: var(--panel); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); border-radius: 24px; padding: 26px; box-shadow: var(--shadow); } .panel h2 { margin: 0 0 20px; font-size: 22px; letter-spacing: -0.02em; } .timeline { position: relative; margin-left: 10px; } .item { position: relative; padding-left: 34px; margin-bottom: 0; } .item::before { content: ""; position: absolute; left: 0; top: 7px; width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-2), var(--accent)); box-shadow: 0 0 0 5px rgba(96,165,250,0.12); } .event-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px 18px; } .event-line { font-size: 15px; line-height: 1.6; word-break: break-word; } .event-name { font-weight: 800; color: white; } .event-meta { color: #d1d5db; } .connector { position: relative; margin-left: 7px; padding: 8px 0 14px 34px; min-height: 74px; } .connector::before { content: ""; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, rgba(96,165,250,0.8), rgba(52,211,153,0.4)); } .delta { display: inline-block; margin-top: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: var(--muted); border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 700; } .empty { color: var(--muted); padding: 10px 0 0 4px; font-size: 15px; } .support { margin-top: 14px; color: var(--muted); font-size: 14px; } .ok { color: #86efac; } .warn { color: #fcd34d; } @media (max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } } @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 26px; } .event-line { font-size: 14px; } } .logo-center { text-align: center; margin-bottom: 10px; } .logo-center img { height: 250px; } </style></head><body><div class="wrap"><section class="hero"><div class="logo-center"><img src="logo.png" alt="Logo"></div><h1>Monitor de batería</h1><div class="subtitle"> Seguimiento en tiempo real del nivel de batería y de los cambios de carga. </div><div class="grid"><div class="stat"><div class="stat-label">Hora de ingreso</div><div class="stat-value" id="horaIngreso">--:--</div></div><div class="stat"><div class="stat-label">Batería al ingresar</div><div class="stat-value" id="bateriaIngreso">--%</div></div><div class="stat"><div class="stat-label">Estado actual</div><div class="stat-value" id="estadoActual">Sin datos</div></div><div class="stat"><div class="stat-label">Umbral batería baja</div><div class="stat-value">50%</div></div></div><div class="actions"><button class="primary" id="descargarBtn">Descargar informe TXT</button><button class="secondary" id="limpiarBtn">Limpiar historial</button></div><div class="support" id="soporte">Verificando compatibilidad...</div></section><section class="panel"><h2>Registro de eventos</h2><div class="timeline" id="timeline"></div></section></div><script> const UMBRAL_BATERIA_BAJA = 0.50; const estado = { horaIngreso: null, bateriaIngreso: null, eventos: [], lowBatteryActive: false, ultimoCharging: null }; const elHoraIngreso = document.getElementById("horaIngreso"); const elBateriaIngreso = document.getElementById("bateriaIngreso"); const elEstadoActual = document.getElementById("estadoActual"); const elTimeline = document.getElementById("timeline"); const elSoporte = document.getElementById("soporte"); const elDescargarBtn = document.getElementById("descargarBtn"); const elLimpiarBtn = document.getElementById("limpiarBtn"); function pad(n) { return String(n).padStart(2, "0"); } function formatHora(date) { return `${pad(date.getHours())}:${pad(date.getMinutes())}`; } function formatPorcentaje(level) { return `${Math.round(level * 100)}%`; } function formatDuracion(ms) { const totalMin = Math.max(0, Math.floor(ms / 60000)); const horas = Math.floor(totalMin / 60); const minutos = totalMin % 60; return `${pad(horas)}:${pad(minutos)}`; } function formatFechaArchivo(date) { return `${pad(date.getDate())}${pad(date.getMonth() + 1)}${date.getFullYear()}_${pad(date.getHours())}${pad(date.getMinutes())}`; } function nombreEvento(codigo) { switch (codigo) { case "inicio": return "Inicio de lectura de batería"; case "bateria_baja": return "Batería al 50%"; case "cargando": return "Batería cargando"; case "desconectada": return "Batería desconectada de la carga"; default: return codigo; } } function agregarEvento(codigo, level) { const ahora = new Date(); estado.eventos.push({ codigo, nombre: nombreEvento(codigo), hora: formatHora(ahora), timestamp: ahora.getTime(), porcentaje: Math.round(level * 100) }); renderTimeline(); } function actualizarEstadoActual(battery) { elEstadoActual.textContent = `${formatPorcentaje(battery.level)} · ${battery.charging ? "Cargando" : "Sin cargar"}`; } function revisarBateriaBaja(battery) { if (battery.level <= UMBRAL_BATERIA_BAJA && !estado.lowBatteryActive) { agregarEvento("bateria_baja", battery.level); estado.lowBatteryActive = true; } if (battery.level > UMBRAL_BATERIA_BAJA) { estado.lowBatteryActive = false; } } function renderTimeline() { if (estado.eventos.length === 0) { elTimeline.innerHTML = `<div class="empty">Todavía no hay eventos registrados.</div>`; return; } let html = ""; estado.eventos.forEach((evento, index) => { html += ` <div class="item"><div class="event-card"><div class="event-line"><span class="event-name">Evento:</span><span class="event-meta">${evento.nombre}</span> &nbsp;|&nbsp; <span class="event-name">Hora:</span><span class="event-meta">${evento.hora}</span> &nbsp;|&nbsp; <span class="event-name">Porcentaje:</span><span class="event-meta">${evento.porcentaje}%</span></div></div></div> `; const proximo = estado.eventos[index + 1]; if (proximo) { const diferencia = formatDuracion(proximo.timestamp - evento.timestamp); html += ` <div class="connector"><div class="delta">Tiempo transcurrido hasta el próximo evento: ${diferencia}</div></div> `; } }); elTimeline.innerHTML = html; } function generarInformeTXT() { const lineas = []; lineas.push("INFORME DE ACTIVIDAD DE BATERÍA"); lineas.push(""); lineas.push(`Hora de ingreso al sitio: ${estado.horaIngreso || "--:--"}`); lineas.push(`Batería al ingresar: ${estado.bateriaIngreso != null ? estado.bateriaIngreso + "%" : "--%"}`); lineas.push(""); if (estado.eventos.length === 0) { lineas.push("No hay eventos registrados."); } else { for (let i = 0; i < estado.eventos.length; i++) { const ev = estado.eventos[i]; lineas.push(`Evento: ${ev.nombre} | Hora: ${ev.hora} | Porcentaje: ${ev.porcentaje}%`); const siguiente = estado.eventos[i + 1]; if (siguiente) { const diferencia = formatDuracion(siguiente.timestamp - ev.timestamp); lineas.push(`Tiempo transcurrido hasta el próximo evento: ${diferencia}`); } } } lineas.push(""); lineas.push("DIAGNÓSTICO:"); lineas.push(generarDiagnostico()); return lineas.join("\n"); } function descargarInforme() { const ahora = new Date(); const nombreArchivo = `Informe_actividad_bateria_${formatFechaArchivo(ahora)}.txt`; const contenido = generarInformeTXT(); const blob = new Blob([contenido], { type: "text/plain;charset=utf-8" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = nombreArchivo; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); } async function iniciar() { const ingreso = new Date(); estado.horaIngreso = formatHora(ingreso); elHoraIngreso.textContent = estado.horaIngreso; if (!("getBattery" in navigator)) { elSoporte.innerHTML = `<span class="warn">Este navegador no soporta la API de batería.</span>`; renderTimeline(); return; } try { const battery = await navigator.getBattery(); estado.bateriaIngreso = Math.round(battery.level * 100); estado.ultimoCharging = battery.charging; elBateriaIngreso.textContent = `${estado.bateriaIngreso}%`; actualizarEstadoActual(battery); agregarEvento("inicio", battery.level); revisarBateriaBaja(battery); elSoporte.innerHTML = `<span class="ok">Lectura de batería activa.</span>`; battery.addEventListener("levelchange", () => { actualizarEstadoActual(battery); revisarBateriaBaja(battery); }); battery.addEventListener("chargingchange", () => { actualizarEstadoActual(battery); if (battery.charging && estado.ultimoCharging === false) { agregarEvento("cargando", battery.level); } if (!battery.charging && estado.ultimoCharging === true) { agregarEvento("desconectada", battery.level); } estado.ultimoCharging = battery.charging; }); } catch (error) { console.error(error); elSoporte.innerHTML = `<span class="warn">No se pudo acceder al estado de la batería.</span>`; } renderTimeline(); } elDescargarBtn.addEventListener("click", descargarInforme); elLimpiarBtn.addEventListener("click", () => { estado.eventos = []; estado.lowBatteryActive = false; renderTimeline(); }); function generarDiagnostico() { const eventos = estado.eventos; let descargas = []; for (let i = 0; i < eventos.length; i++) { const ev = eventos[i]; if (ev.porcentaje >= 90) { for (let j = i + 1; j < eventos.length; j++) { const siguiente = eventos[j]; if (siguiente.porcentaje <= 50) { const tiempo = siguiente.timestamp - ev.timestamp; descargas.push(tiempo); break; } } } } let texto = ""; if (descargas.length === 0) { texto = "No se registraron suficientes datos para evaluar el comportamiento de la batería."; return texto; } const promedio = descargas.reduce((a, b) => a + b, 0) / descargas.length; const minutos = Math.floor(promedio / 60000); if (minutos >= 120) { texto = `La batería presenta un buen rendimiento. El tiempo promedio de descarga desde niveles altos hasta el 50% es de aproximadamente ${Math.floor(minutos/60)}h ${minutos%60}min, lo cual indica un estado saludable.`; } else if (minutos >= 60) { texto = `La batería muestra un rendimiento aceptable. El tiempo promedio de descarga hasta el 50% es de ${Math.floor(minutos/60)}h ${minutos%60}min.`; } else { texto = `Se observa una descarga rápida de la batería. El tiempo promedio hasta el 50% es de ${minutos} minutos, lo cual puede indicar desgaste o baja autonomía.`; } const cargas = eventos.filter(e => e.codigo === "cargando").length; texto += ` Se registraron ${cargas} eventos de carga durante la sesión.`; return texto; } iniciar(); </script></body></html>
